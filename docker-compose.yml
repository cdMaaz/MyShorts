services:
  myshorts:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./uploads:/app/uploads
    environment:
      - MAX_CONCURRENT_JOBS=3
      - JOB_TTL_SECONDS=7200
      # Optional: add your YouTube cookies to bypass bot detection
      # - YOUTUBE_COOKIES=<contents of cookies.txt>
    restart: unless-stopped
